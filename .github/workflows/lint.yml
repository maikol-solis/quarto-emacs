name: lint

on:
  push:
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        emacs_version:
          - '29.1'
          - '29.4'
          - '30.1'
          - 'snapshot'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Emacs
        uses: purcell/setup-emacs@master
        with:
          version: ${{ matrix.emacs_version }}

      - name: Set up Cask
        uses: cask/setup-cask@master

      - name: Install dependencies
        run: cask install

      # Hard gate: compilation must succeed. The few residual warnings come
      # from polymode's `define-polymode' macro (wrapped in an `if'); they are
      # not errors, so `error-on-warn' is intentionally not enabled here.
      - name: Byte-compile
        run: |
          cask emacs -Q --batch -L . \
            -f batch-byte-compile quarto-mode.el

      # Hard gate: the source is checkdoc-clean. Any new docstring warning
      # produces output and fails the job.
      # Filter to lines from quarto-mode.el itself; Cask's own files emit
      # deprecation noise on snapshot Emacs (>= 31.1) that must be ignored.
      - name: checkdoc
        run: |
          cask emacs -Q --batch \
            --eval '(checkdoc-file "quarto-mode.el")' 2>&1 \
            | grep "^quarto-mode\.el" | tee checkdoc.log || true
          test ! -s checkdoc.log

      # Advisory: package-lint is informational. The lone remaining finding is
      # a `with-eval-after-load' warning, which is the correct pattern for the
      # optional `python' integration. Reviewers should still read its output.
      - name: package-lint
        continue-on-error: true
        run: |
          cask emacs -Q --batch \
            --eval "(progn
                      (require 'package)
                      (add-to-list 'package-archives '(\"melpa\" . \"https://melpa.org/packages/\") t)
                      (package-initialize)
                      (package-refresh-contents)
                      (unless (package-installed-p 'package-lint)
                        (package-install 'package-lint)))" \
            -l package-lint \
            -f package-lint-batch-and-exit quarto-mode.el
